name: Build installers

# Triggered manually from the GitHub Actions tab — not on every push.
# Use this when you're ready to cut a new release.
on:
  workflow_dispatch:

jobs:

  # Runs on an Intel Mac provided by GitHub.
  # Produces TherapyFinder_macOS_intel.zip.
  build-macos-intel:
    runs-on: macos-13
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller busy_therapists.spec --clean -y

      - name: Create launcher script
        # Same launcher as in dist/ locally — strips macOS quarantine on first run
        run: |
          cat > "dist/Run Therapy Finder.command" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          xattr -dr com.apple.quarantine "busy_therapists.app" 2>/dev/null
          "busy_therapists.app/Contents/MacOS/busy_therapists"
          EOF
          chmod +x "dist/Run Therapy Finder.command"

      - name: Package into zip
        run: |
          cp my_data.csv.example dist/my_data.csv.example
          cd dist
          zip -r ../TherapyFinder_macOS_intel.zip \
            busy_therapists.app \
            "Run Therapy Finder.command" \
            my_data.csv.example

      - name: Upload artifact
        # Makes the zip downloadable from the Actions tab on GitHub
        uses: actions/upload-artifact@v4
        with:
          name: TherapyFinder_macOS_intel
          path: TherapyFinder_macOS_intel.zip

  # Runs on a Windows machine provided by GitHub.
  # Produces TherapyFinder_Windows.zip.
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller busy_therapists.spec --clean -y

      - name: Create launcher script
        # A .bat file is the Windows equivalent of the .command launcher on macOS.
        # It opens a terminal, runs the app, and keeps the window open (pause) so
        # the user can read the output before it closes.
        shell: pwsh
        run: |
          $bat = "@echo off`ncd /d `"%~dp0`"`nbusy_therapists\busy_therapists.exe`npause"
          Set-Content -Path "dist\Run Therapy Finder.bat" -Value $bat -Encoding utf8

      - name: Package into zip
        shell: pwsh
        run: |
          Copy-Item my_data.csv.example dist\my_data.csv.example
          Compress-Archive `
            -Path dist\busy_therapists, dist\my_data.csv.example, "dist\Run Therapy Finder.bat" `
            -DestinationPath TherapyFinder_Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TherapyFinder_Windows
          path: TherapyFinder_Windows.zip
